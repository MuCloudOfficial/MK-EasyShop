General:

  # 设置文件版本
  # ！！！若非特殊说明，请不要随意改动该设置！！！
  # ！！！对于无端改动该设置可能造成的设置丢失问题与作者无关，也不要提交至 ISSUE！！！
  Version: StarrySky_C1.0

  # 本插件输出信息的前缀
  Prefix: "&6&l商店系统 &7&l>>>"

  # 商店界面的主标题
  GUITitleName: "&6&l商店系统"

#======================================================================#
#                                         数据库相关  |  About Database                                     #
#======================================================================#
#  该区域设置由于正在测试阶段暂不可用，存储方式暂时为 Yaml 文件存储，之后的二测版本会出  #
#======================================================================#
Database:

  # 如果开启此选项，则该插件会调整为使用数据库方式存储数据
  enable: false

  # 存储方式
  # 当前可用：MYSQL, SQLITE
  type: SQLITE

  # 数据库存储地址
  # ！！！若非了解数据库相关知识，请不要随意改动该选项！！！
  # ！！！对于无端更改该选项可能造成的数据丢失与作者无关，且不要提交 ISSUE！！！
  url: "jdbc:mysql://127.0.0.1:3306/mk_esd"

  # 数据库用户
  account: "root"

  # 数据库密码
  password: "123456"

#======================================================================#
#                                            商店相关  |  About Shop                                          #
#======================================================================#
Shop:

  # 在该选项中写入玩家名
  # 则全服通过收购方式获取的金钱全部由该玩家收取
  SellAccount: "Mu_Cloud"

  # 如果开启此选项，则玩家在进行收购时必须拥有多于该收购项目的最大可收购数量的物品，且一次性收购
  OnceSell: false

